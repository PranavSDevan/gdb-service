spring:
  application:
    name: transactions-service
  profiles:
    active: dev # Switch this to 'prod' to test production rules

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/docs

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger - %msg%n"

# Internal service client URLs (used by AuthClient.java @Value)
app:
  services:
    auth-url: ${AUTH_SERVICE_URL:http://localhost:8004}

# External service client URLs
external:
  account-service:
    url: ${ACCOUNT_SERVICE_URL:http://localhost:8001}
  payment-gateway-service:
    url: ${PAYMENT_GATEWAY_SERVICE_URL:http://localhost:8008}

# Eureka Client Configuration (shared across all profiles)
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

---
# -------------------------------------------------------------------
# DEV PROFILE CONFIGURATION
# -------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: dev

banking:
  limits:
    daily-max-limit: 10000.00 # Aligned configuration key for dev

---
# -------------------------------------------------------------------
# PROD PROFILE CONFIGURATION
# -------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: prod

banking:
  limits:
    daily-max-limit: 50000.00 # Higher limit configuration key for prod