server:
  port: 8002

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gdb_transactions_db}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    com.gdb.transactions: DEBUG

transfer:
  limits:
    dailyMaxLimit: 50000.00

external:
  account-service:
    url: ${ACCOUNT_SERVICE_URL:http://localhost:8001}
  # FIX: Added missing payment-gateway mapping to resolve the initialization crash
  payment-gateway-service:
    url: ${PAYMENT_GATEWAY_SERVICE_URL:http://localhost:8008}