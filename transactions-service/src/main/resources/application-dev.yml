server:
  port: 8002

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gdb_transactions_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    com.gdb.transactions: DEBUG

transfer:
  limits:
    dailyMaxLimit: 50000.00

external:
  account-service:
    url: http://localhost:8001
  # FIX: Added missing payment-gateway mapping to resolve the initialization crash
  payment-gateway-service:
    url: ${PAYMENT_GATEWAY_SERVICE_URL:http://localhost:8008}

# FIX: Added Eureka Discovery routing configuration so it registers cleanly with your dashboard
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/